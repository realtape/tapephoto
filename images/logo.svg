<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 64" fill="none" stroke="currentColor">
  <!-- Aperture mark -->
  <g transform="translate(32 32)" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round">
    <!-- outer ring -->
    <circle r="26" />
    <!-- 6 aperture blades forming iris -->
    <g fill="currentColor" fill-opacity="0.08">
      <path d="M 0 -22 L 19 -11 L 11 0 Z" />
      <path d="M 19 -11 L 19 11 L 11 0 Z" />
      <path d="M 19 11 L 0 22 L 11 0 Z" transform="rotate(60)" />
      <path d="M 0 -22 L 19 -11 L 11 0 Z" transform="rotate(120)" />
      <path d="M 19 -11 L 19 11 L 11 0 Z" transform="rotate(120)" />
      <path d="M 19 11 L 0 22 L 11 0 Z" transform="rotate(180)" />
    </g>
    <!-- blade edges -->
    <path d="M 0 -22 L 11 0 M 19 -11 L 11 0 M 19 11 L 11 0 M 0 22 L 11 0 M -19 11 L 11 0 M -19 -11 L 11 0" opacity="0.55" />
    <!-- inner aperture hole -->
    <circle r="5.5" stroke-width="2" />
  </g>

  <!-- Wordmark -->
  <text x="72" y="41" font-family="'Playfair Display', Georgia, serif" font-size="26" font-style="italic" font-weight="700" fill="currentColor" stroke="none" letter-spacing="-0.5">tapephoto</text>
</svg>
