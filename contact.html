<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | TapePhoto - Carlos Martinez Photography</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <a href="index.html" class="logo">tapephoto</a>
        <button class="menu-toggle" aria-label="Toggle menu">
            <span></span><span></span>
        </button>
        <nav class="nav">
            <a href="index.html#work">Work</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <main class="contact-hero">
        <div class="contact-image">
            <img src="images/coastal_aerial.jpg" alt="Aerial Photography - Chile Coast">
        </div>
        <div class="contact-text">
            <h1>let's connect.</h1>
            <p>For inquiries, bookings, or just a chat about photography.</p>
            <form class="contact-form">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" placeholder="Your name" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" placeholder="Your email address" required>
                </div>
                <div class="form-group">
                    <label>Message</label>
                    <textarea rows="5" placeholder="Your message..." required></textarea>
                </div>
                <button type="submit" class="submit-btn">Send Message</button>
            </form>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-inner">
            <div class="footer-brand">
                <a href="index.html" class="logo">tapephoto</a>
                <p>Carlos Martinez Photography<br>Coquimbo, Chile</p>
            </div>
            <div class="footer-links">
                <h4>Navigate</h4>
                <a href="index.html#work">Work</a>
                <a href="about.html">About</a>
                <a href="contact.html">Contact</a>
            </div>
            <div class="footer-social">
                <h4>Follow</h4>
                <a href="https://instagram.com/tapephotocom" target="_blank">Instagram</a>
                <a href="https://facebook.com/tapephoto" target="_blank">Facebook</a>
            </div>
            <div class="footer-newsletter">
                <h4>Stay in Touch</h4>
                <form class="newsletter-form">
                    <input type="email" placeholder="your@email.com" required>
                    <button type="submit">Subscribe</button>
                </form>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2026 TapePhoto. All rights reserved.</p>
        </div>
    </footer>

    <script src="main.js"></script>
</body>
</html>
