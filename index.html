<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TapePhoto | Carlos Martinez Photography</title>
    <!-- SEO Meta Tags -->
    <meta name="description" content="Official portfolio of Carlos Martinez. Capturing motorsport, aerial drone views, and travel stories with a cinematic editorial style.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <a href="index.html" class="logo-text">tapephoto</a>
        <nav>
            <ul>
                <li><a href="index.html#portfolio">Portfolio</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="portfolio" class="portfolio-container">
            <div class="masonry-grid">
                <!-- Hero: Motorsport / IndyCar (US Concrete) -->
                <div class="gallery-item item-large">
                    <img src="images/tape_motorsport_indycar.jpg" alt="IndyCar US Concrete on track - Carlos Martinez">
                    <div class="overlay"><span>Motorsport</span></div>
                </div>

                <!-- Aerial coastal sunrise -->
                <div class="gallery-item item-tall">
                    <img src="images/tape_aerial_coast.jpg" alt="Coastal aerial view at sunrise - Carlos Martinez">
                    <div class="overlay"><span>Aerial</span></div>
                </div>

                <!-- Wildlife -->
                <div class="gallery-item">
                    <img src="images/tape_wildlife_caiman.jpg" alt="Caiman wildlife close-up - Carlos Martinez">
                    <div class="overlay"><span>Wildlife</span></div>
                </div>

                <!-- Urban cityscape: San Francisco -->
                <div class="gallery-item">
                    <img src="images/tape_urban_sanfrancisco.jpg" alt="San Francisco skyline - Carlos Martinez">
                    <div class="overlay"><span>Urban</span></div>
                </div>

                <!-- Music / concert -->
                <div class="gallery-item item-large">
                    <img src="images/tape_music_concert.jpg" alt="Live concert performance in black and white - Carlos Martinez">
                    <div class="overlay"><span>Music</span></div>
                </div>

                <!-- Nightscape: city lights from above, B&W -->
                <div class="gallery-item item-wide">
                    <img src="images/tape_nightscape_lights.jpg" alt="City lights at night from above - Carlos Martinez">
                    <div class="overlay"><span>Nightscape</span></div>
                </div>

                <!-- Landscape: sunset over coastal city -->
                <div class="gallery-item">
                    <img src="images/tape_landscape_sunset.jpg" alt="Sunset over coastal city and mountains - Carlos Martinez">
                    <div class="overlay"><span>Landscape</span></div>
                </div>

                <!-- Portrait: Carlos Martinez -->
                <div class="gallery-item">
                    <img src="images/tape_portrait_carlos.jpg" alt="Carlos Martinez self portrait">
                    <div class="overlay"><span>Portrait</span></div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="newsletter-section">
            <h3>get notified.</h3>
            <p>Join the inner circle for new prints and workshops.</p>
            <form class="newsletter-form">
                <input type="email" placeholder="email address" required>
                <button type="submit">Subscribe</button>
            </form>
        </div>

        <div class="social-links">
            <a href="https://instagram.com/tapephotocom" target="_blank">Instagram</a>
            <a href="https://facebook.com/tapephoto" target="_blank">Facebook</a>
            <a href="#">Twitter</a>
            <a href="#">YouTube</a>
        </div>
        
        <p style="margin-top: 60px; font-size: 0.6rem; letter-spacing: 0.1rem; opacity: 0.5;">
            &copy; 2026 TAPEPHOTO | CARLOS MARTINEZ PHOTOGRAPHY. ALL RIGHTS RESERVED.
        </p>
    </footer>

    <script src="main.js"></script>
</body>
</html>
